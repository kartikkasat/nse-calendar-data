name: Sync Google Sheet to holidays.json

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch CSV from Google Sheet
        run: |
          curl -L -o holidays.csv "https://docs.google.com/spreadsheets/d/${{ secrets.SHEET_ID }}/export?format=csv"
          echo "First 5 lines of CSV:"
          head -n 5 holidays.csv
          # Check if CSV contains any data (more than just header)
          if [ $(wc -l < holidays.csv) -le 1 ]; then
            echo "ERROR: CSV is empty or contains only header. Check sheet sharing and ID."
            exit 1
          fi

      - name: Convert CSV to JSON
        run: |
          python << 'EOF'
          import csv, json, datetime

          holidays = {}
          special_session = {}

          with open('holidays.csv', 'r') as f:
              reader = csv.DictReader(f)
              rows = list(reader)
              print(f"Read {len(rows)} data rows from CSV")
              for row in rows:
                  year = row.get('Year', '').strip()
                  date = row.get('Date', '').strip()
                  desc = row.get('Description', '').strip()
                  row_type = row.get('Type', '').strip().lower()

                  if not year or not date:
                      continue

                  entry = {"date": date, "description": desc}

                  if row_type == 'special_session':
                      special_session.setdefault(year, []).append(entry)
                  else:
                      holidays.setdefault(year, []).append(entry)

          output = {
              "schema_version": 1,
              "last_updated": datetime.date.today().isoformat(),
              "source": "google_sheets_sync",
              "holidays": holidays,
              "special_session": special_session
          }

          with open('holidays.json', 'w') as f:
              json.dump(output, f, indent=2)

          total_h = sum(len(v) for v in holidays.values())
          total_s = sum(len(v) for v in special_session.values())
          print(f"✅ holidays: {total_h} entries across {len(holidays)} years")
          print(f"✅ special_session: {total_s} entries across {len(special_session)} years")
          if total_h == 0 and total_s == 0:
              print("ERROR: No holidays or special sessions found in CSV. Exiting to avoid overwriting.")
              exit(1)
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add holidays.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update holidays.json from sheet [$(date -u +%Y-%m-%d)]"
          git push
